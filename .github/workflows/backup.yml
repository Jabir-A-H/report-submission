name: Daily Supabase Database Backup

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private backup repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.BACKUP_REPO }} # e.g. "Jabir-A-H/report-backups-private"
          token: ${{ secrets.BACKUP_TOKEN }}
          path: backup-repo
      
      - name: Perform pg_dump (Postgres 17 container)
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          DATE=$(date +%Y-%m-%d)
          docker run --rm \
            -e PGPASSWORD="$PGPASSWORD" \
            -v "$PWD/backup-repo/backups:/backups" \
            postgres:17 \
            pg_dump \
              --host aws-1-ap-southeast-2.pooler.supabase.com \
              --port 5432 \
              --username "postgres.${PROJECT_REF}" \
              --dbname postgres \
              --no-password \
              --sslmode=require \
              --file "/backups/db_backup_${DATE}.sql"

      - name: Commit and Push
        working-directory: backup-repo
        run: |
          git config --global user.name "Backup Bot"
          git config --global user.email "backup@bot.com"
          git add backups/
          git commit -m "Automated backup for $(date +%Y-%m-%d)"
          git push
